name: Build & Test


on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    tags:
      - 'v*.*.*'
concurrency: 
  group: build-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build-ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 16
          cache: 'npm'
      - name: install voyager dependencies
        run: (cd source/voyager && npm ci --legacy-peer-deps)
      - name: install ui dependencies
        run: npm ci && (cd source/ui && npm ci)
      - name: build UI
        run: npm run build-ui
      - uses: actions/upload-artifact@v6
        with:
          name: "client"
          path: "dist"
          if-no-files-found: error
          retention-days: 1

  build-server:
    name: Server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    services:
      postgres: &postgres
        image: postgres:18
        ports:
          - 5432:5432
        command: >
          postgres
          -c log_statement=none 
          -c log_duration=off 
          -c log_min_messages=panic 
          -c log_error_verbosity=terse
          -c checkpoint_timeout=1h
          -c fsync=off
          -c synchronous_commit=off
          -c full_page_writes=off
          -c autovacuum=off
          -c max_wal_size=128MB
          -c min_wal_size=64MB
          -c shared_buffers=128MB 
          -c work_mem=64MB
          -c max_connections=100
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql:rw,noexec,nosuid,size=512m
          --shm-size=512m
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGPASSWORD: postgres
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: install
        run: npm ci && (cd source/server && npm ci)
      - name: test
        run: (cd source/server && npm test)
      - name: build
        run:  npm run build-server
      - uses: actions/upload-artifact@v6
        if: matrix.node-version == 22
        with:
          name: "server"
          path: |
            source/server/dist/*
            !source/server/dist/*.test.js
            !source/server/dist/*.test.js.map
            !source/server/dist/__test_fixtures/**
            source/server/package.json
            source/server/package-lock.json
            source/server/migrations/
            source/server/templates/
            source/server/LICENSE.md
          retention-days: 1

  pack:
    name: Pack tarball
    runs-on: ubuntu-latest
    needs: [build-ui, build-server]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: eCorpus
      - name: edit internal structure
        working-directory: eCorpus
        run: |
          mv server/* ./
          rm -r server

      - uses: actions/upload-artifact@v6
        with:
          name: "eCorpus-${{github.ref_name}}"
          path: eCorpus
          if-no-files-found: error
          retention-days: 10

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs: [ pack ]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: "eCorpus-${{github.ref_name}}"
          skip-decompress: true
      - run: ls -R
      - name: create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "eCorpus-${{github.ref_name}}.*"
          prerelease: ${{ needs.version.outputs.prerelease }}
          artifactErrorsFailBuild: true
          name: ${{ needs.version.outputs.release }}
          tag: ${{ needs.version.outputs.release }}

  e2e:
    # Uses the packed tarball to run end-to-end tests.
    # Verifies that the built client and server work together correctly
    name: Test End-to-End
    runs-on: ubuntu-latest
    needs: [ pack ]

    services:
      postgres: *postgres
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGPASSWORD: postgres
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            source/e2e
      - uses: actions/download-artifact@v8
        with:
          name: "eCorpus-${{github.ref_name}}"
          path: build
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: install dependencies
        run: |
          npm ci
          (cd build && npm ci --omit=dev)
          (cd source/e2e && npm ci)
          (cd source/e2e && npx playwright install  --with-deps)
      - name: run tests
        working-directory: source/e2e
        env:
          ROOT_DIR: "${{ github.workspace}}/build"
          DIST_DIR: "${{ github.workspace}}/build/client"
        run: npm test

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: source/e2e/playwright-report/
          retention-days: 10


  build_docker:
    # This is distinct from the "publish" workflow
    # as it verifies that the docker image can be built and uses it to run end-to-end tests,
    # but does not publish the image to the registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: build containers
        run: |
          export PLAYWRIGHT_VERSION=$(node -e "const l=require('./source/e2e/package-lock.json'); console.log(l.packages['node_modules/@playwright/test'].version)")
          docker compose build
          docker compose build test
      - name: run end to end tests
        # to repeatedly test this locally,
        # run `docker compose down -v` to reset volumes between runs
        run: |
          export APP_PORT=0
          docker compose up -y \
          --force-recreate \
          --always-recreate-deps \
          --renew-anon-volumes \
          --no-color \
          --exit-code-from test \
          test
